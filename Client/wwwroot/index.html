<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#22272E" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F6F8FA" media="(prefers-color-scheme: light)" />
    <title>Dating App</title>
    <base href="/" />

    <link rel="preload" id="webassembly" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" />

    <link rel="stylesheet" href="css/app#[.{fingerprint}].css" />
    <link rel="stylesheet" href="css/spinner#[.{fingerprint}].css" />
    <link rel="stylesheet" href="css/animations#[.{fingerprint}].css" />
    <link rel="stylesheet" href="_content/MudBlazor/MudBlazor.min.css" />
    <link rel="stylesheet" href="Client.styles.css" />
    <script type="importmap"></script>
</head>

<body>
    <main id="app">
        <div class="boot-screen">
            <div class="boot-brand">
                <span class="boot-brand-mark">&#9829;</span>
                <span class="boot-brand-text">Dating App</span>
            </div>
            <div class="spin-wave" aria-hidden="true">
                <div class="spin-rect spin-rect1"></div>
                <div class="spin-rect spin-rect2"></div>
                <div class="spin-rect spin-rect3"></div>
                <div class="spin-rect spin-rect4"></div>
                <div class="spin-rect spin-rect5"></div>
            </div>
            <p class="boot-status">Loading&hellip;</p>
        </div>
    </main>

    <footer id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">&#x1f5d9;</a>
    </footer>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>

</html>
